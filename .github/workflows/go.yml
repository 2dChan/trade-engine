name: Go

permissions:
  contents: read

on:
  push:
    branches: [ "main" ]
  pull_request:
    branches: [ "main" ]

jobs:
  build-test-lint:
    runs-on: ubuntu-latest
    defaults:
      run:
        working-directory: ${{ matrix.module }}
    strategy:
      fail-fast: false
      matrix:
        module:
          - lib
          - adapters/bcs
          - adapters/tinvest
          - bots
          - dashboard/backend

    name: ${{ matrix.module }}
    steps:
      - uses: actions/checkout@v6

      - name: Set up Go
        uses: actions/setup-go@v6
        with:
          go-version: '1.26.1'
          check-latest: true
          cache: true
          cache-dependency-path: ${{ matrix.module }}/go.sum

      - name: Set up Protoc
        if: matrix.module == 'adapters/tinvest'
        uses: arduino/setup-protoc@v3
        with:
          version: '33.0'

      - name: Setup proto dependencies
        if: matrix.module == 'adapters/tinvest'
        run: |
          go install -v github.com/stormcat24/protodep@v0.1.8
          go install -v google.golang.org/protobuf/cmd/protoc-gen-go@v1.36.11
          go install -v google.golang.org/grpc/cmd/protoc-gen-go-grpc@v1.6.1
          export PATH="$(go env GOPATH)/bin:$PATH"
          protodep up --use-https
          protoc -I=proto \
            --go_out=proto \
            --go-grpc_out=proto \
            proto/*.proto

      - name:  Verify dependencies
        run: |
          go mod verify
          go mod tidy
          git diff --exit-code go.mod go.sum

      - name: Fmt
        run: |
          if [[ $(gofmt -l . | tee /dev/stderr) ]]; then
            echo "Code is not gofmt-ed, run gofmt!"
            exit 1
          fi

      - name: Copy example configs
        if: matrix.module == 'bots'
        run: |
          src="cmd/example/config.example.go"
          for dir in cmd/*/; do
            [ "$dir" = "cmd/example/" ] && continue
            if [ ! -f "$dst" ]; then
              cp "$src" "${dir}"
            fi
          done

      - name: Security scan
        run: |
          go install golang.org/x/vuln/cmd/govulncheck@latest
          govulncheck ./... 

      - name: Lint
        uses: golangci/golangci-lint-action@v9.2.0
        with:
          version: latest 
          working-directory: ${{ matrix.module }}
          args: "--enable=gosec --timeout=5m"

      - name: Build
        run: |
          go build -v ./...

      - name: Test
        run: |
          go test -v -race -coverprofile=coverage.out -covermode=atomic ./...
          go tool cover -func=coverage.out

      - name: Upload coverage to Codecov
        uses: codecov/codecov-action@v6
        with:
          files: ${{ matrix.module }}/coverage.out
          flags: ${{ matrix.module }}
          fail_ci_if_error: false
