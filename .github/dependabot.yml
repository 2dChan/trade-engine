version: 2
updates:
  - package-ecosystem: "github-actions"
    directory: "/"
    schedule:
      interval: "weekly"
    commit-message:
      prefix: "chore(ci): "

  - package-ecosystem: gomod
    directory: "/lib"
    schedule:
      interval: "weekly"
    commit-message:
      prefix: "chore(lib): "

  - package-ecosystem: gomod
    directory: "/adapters/bcs"
    schedule:
      interval: "weekly"
    commit-message:
      prefix: "chore(adapters/bcs): "

  - package-ecosystem: gomod
    directory: "/bots"
    schedule:
      interval: "weekly"
    commit-message:
      prefix: "chore(bots): "

  - package-ecosystem: gomod
    directory: "/dashboard/backend"
    schedule:
      interval: "weekly"
    commit-message:
      prefix: "chore(backend): "
